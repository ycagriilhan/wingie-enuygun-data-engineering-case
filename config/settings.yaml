project_root: .
run_mode: local

paths:
  source_dir: data/source
  landing_dir: data/landing
  raw_dir: data/raw
  staging_dir: data/staging
  mart_dir: data/mart
  artifact_dir: reports/artifacts

cloud:
  bucket: ${GCS_BUCKET}
  project_id: ${GCP_PROJECT_ID}
  landing_prefix: ${GCS_LANDING_PREFIX}
  bigquery_location: ${GCP_BQ_LOCATION}
  dataset_raw: ${GCP_DATASET_RAW}
  dataset_staging: ${GCP_DATASET_STAGING}
  dataset_mart: ${GCP_DATASET_MART}

features:
  enable_merge_upsert: false
  enable_airflow: false

optional_paths:
  sql_optional_dir: sql/optional
  airflow_dags_dir: orchestration/airflow/dags
